<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Today's Worship</title>
  <meta name="description" content="Lyrics, scripture, and notes for today's worship service.">
  <meta name="theme-color" content="#f5efe2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Worship">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Public worship view -->
  <main id="worship-view" class="view active theme-a" data-size="1">

    <div class="topbar">
      <div class="topbar-left" id="topbar-left"><!-- variant-specific date/church --></div>
      <div class="topbar-right">
        <button class="tb-btn size-down" data-action="size-down" aria-label="Smaller">A<span class="sub">−</span></button>
        <button class="tb-btn size-up" data-action="size-up" aria-label="Larger">A<span class="sub">+</span></button>
        <span class="tb-sep"></span>
        <button class="tb-btn" data-action="toggle-dark" aria-label="Toggle dark mode">
          <span class="dark-indicator">☾</span>
        </button>
      </div>
    </div>

    <header class="worship-header">
      <div class="hdr-date" id="hdr-date"></div>
      <h1 class="worship-title">Today&rsquo;s Worship</h1>
      <div class="hdr-divider" aria-hidden="true">
        <span class="hdr-rule"></span>
        <span class="hdr-ornament">❦</span>
        <span class="hdr-rule"></span>
      </div>
      <div class="hdr-church" id="hdr-church"></div>
    </header>

    <nav class="mini-nav" id="mini-nav" aria-label="Service order"></nav>

    <section id="blocks" class="blocks"></section>

    <footer class="worship-footer" id="worship-footer"></footer>

    <div class="admin-bottom">
      <a href="#admin" class="admin-link">Admin</a>
    </div>
  </main>

  <!-- Login (magic link) view -->
  <section id="login-view" class="view">
    <div class="login-card">
      <h2>Sign in</h2>
      <p class="login-sub">Enter your email and we&rsquo;ll send you a magic link.</p>
      <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
        <button type="submit" class="btn btn-primary">Send magic link</button>
      </form>
      <div id="login-message" class="login-message"></div>
      <a href="#" class="back-link">&larr; Back to worship</a>
    </div>
  </section>

  <!-- Admin / editor view -->
  <section id="admin-view" class="view">
    <header class="admin-header">
      <h2>Edit Today&rsquo;s Worship</h2>
      <div class="admin-actions">
        <span class="signed-in" id="signed-in-as"></span>
        <button class="btn btn-ghost" id="logout-btn">Sign out</button>
      </div>
    </header>

    <div class="admin-body">

      <div class="item-card">
        <div class="item-card-head"><span class="item-card-num">Service</span></div>

        <label for="church-name">Church name</label>
        <input type="text" id="church-name" placeholder="e.g. The Well">

        <label>Style</label>
        <div class="style-picker" id="style-picker">
          <button type="button" class="style-option" data-style="a">
            <span class="style-option-label">A</span>
            <span class="style-option-name">Quiet &amp; Contemplative</span>
          </button>
          <button type="button" class="style-option" data-style="b">
            <span class="style-option-label">B</span>
            <span class="style-option-name">Modern Minimal</span>
          </button>
        </div>

        <label for="footer-text">Footer text</label>
        <input type="text" id="footer-text" placeholder="e.g. Soli Deo Gloria">
        <div class="field-hint">Shown at the bottom of the public page.</div>
      </div>

      <div id="song-editor"></div>

      <div class="add-row">
        <span class="add-label">Add</span>
        <button class="btn btn-secondary" data-action="add" data-type="song">+ Song</button>
        <button class="btn btn-secondary" data-action="add" data-type="scripture">+ Scripture</button>
        <button class="btn btn-secondary" data-action="add" data-type="note">+ Note</button>
      </div>

      <div class="save-bar">
        <a href="#" class="btn btn-ghost">Preview</a>
        <button class="btn btn-primary" id="save-btn">Save</button>
      </div>
      <div id="save-message" class="save-message"></div>
    </div>
  </section>

  <script src="/js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
